name: Bootstrap Apply

on:
  workflow_dispatch:

# Bootstrap creates the state bucket and lock table — race conditions on these
# would corrupt the backend for everyone, so we serialize.
concurrency:
  group: bootstrap-apply
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest

    # STACK_NAME is the single GitHub variable that namespaces this deployment.
    # Each developer sets it to a unique value (e.g. tincho-presti) and all
    # other resource names (state bucket, lock table, frontend bucket) are
    # derived from it by convention.
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_stack_name: ${{ vars.STACK_NAME }}
      TF_STATE_BUCKET: ${{ vars.STACK_NAME }}-state-bucket
      TF_LOCK_TABLE: ${{ vars.STACK_NAME }}-lock-table

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Bootstrap
        run: bash scripts/bootstrap.sh
