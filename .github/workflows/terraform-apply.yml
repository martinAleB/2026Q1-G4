name: Terraform Apply

on:
  workflow_dispatch:

# Serialize apply runs: only one apply can be in flight at a time. We do NOT
# cancel an in-progress apply if another is queued, because cancelling
# Terraform mid-apply can leave the state inconsistent — the second run
# waits for the first to finish.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest

    # STACK_NAME is the single GitHub variable that namespaces this deployment.
    # Each developer sets it to a unique value (e.g. cloud-presti) and the
    # state bucket, lock table, frontend bucket and TF stack_name are derived
    # from it by convention.
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
      STACK_NAME: ${{ vars.STACK_NAME }}
      TF_VAR_stack_name: ${{ vars.STACK_NAME }}
      TF_VAR_bucket_name: ${{ vars.STACK_NAME }}-frontend-bucket
      TF_STATE_BUCKET: ${{ vars.STACK_NAME }}-state-bucket
      TF_LOCK_TABLE: ${{ vars.STACK_NAME }}-lock-table
      TF_FRONTEND_BUCKET_NAME: ${{ vars.STACK_NAME }}-frontend-bucket

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Lambda dependencies
        run: bash scripts/install-lambdas.sh

      - name: Terraform Init
        run: bash scripts/terraform-init.sh

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      # Save the plan to a file and apply that exact file, so the plan that
      # was reviewed is what actually runs. Prevents the apply step from
      # silently picking up state drift that appeared between plan and apply.
      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fixes'
        # Passing a saved plan skips the prompt automatically; -auto-approve
        # would be redundant.
        run: terraform apply tfplan
        working-directory: terraform

