name: Terraform Apply

on:
  workflow_dispatch:

jobs:
  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_bucket_name: ${{ vars.TF_FRONTEND_BUCKET_NAME }}

    defaults:
      run:
        working-directory: terraform

    outputs:
      cognito_domain: ${{ steps.tf_outputs.outputs.cognito_domain }}
      client_id: ${{ steps.tf_outputs.outputs.client_id }}
      api_gateway_endpoint: ${{ steps.tf_outputs.outputs.api_gateway_endpoint }}
      bucket_name: ${{ steps.tf_outputs.outputs.bucket_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color

      - name: Terraform Apply (ECR)
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -no-color -target=aws_ecr_repository.flyway

      - name: Build and push Flyway image to ECR
        if: github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URL="${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/cloud-presti-flyway"
          aws ecr get-login-password --region us-east-1 \
            | docker login --username AWS --password-stdin "${ECR_URL}"
          docker build -t "${ECR_URL}:latest" db/
          docker push "${ECR_URL}:latest"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -no-color

      - name: Capture Terraform Outputs
        id: tf_outputs
        if: github.ref == 'refs/heads/main'
        run: |
          echo "cognito_domain=$(terraform output -raw auth_cognito_domain)" >> $GITHUB_OUTPUT
          echo "client_id=$(terraform output -raw auth_client_id)" >> $GITHUB_OUTPUT
          echo "api_gateway_endpoint=$(terraform output -raw auth_api_gateway_endpoint)" >> $GITHUB_OUTPUT
          echo "bucket_name=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.ref == 'refs/heads/main'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Create .env.local
        working-directory: frontend
        run: |
          cat > .env.local << EOF
          VITE_COGNITO_DOMAIN=https://${{ needs.infrastructure.outputs.cognito_domain }}.auth.us-east-1.amazoncognito.com
          VITE_COGNITO_CLIENT_ID=${{ needs.infrastructure.outputs.client_id }}
          VITE_API_GATEWAY_CALLBACK_URL=${{ needs.infrastructure.outputs.api_gateway_endpoint }}/callback
          EOF

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ needs.infrastructure.outputs.bucket_name }} --delete --acl public-read
        working-directory: frontend
