name: Terraform Apply

on:
  workflow_dispatch:

# Serialize apply runs: only one apply can be in flight at a time. We do NOT
# cancel an in-progress apply if another is queued, because cancelling
# Terraform mid-apply can leave the state inconsistent — the second run
# waits for the first to finish.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest

    # STACK_NAME is the single GitHub variable that namespaces this deployment.
    # Each developer sets it to a unique value (e.g. tincho-presti) and the
    # state bucket, lock table, frontend bucket and TF stack_name are derived
    # from it by convention.
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_stack_name: ${{ vars.STACK_NAME }}
      TF_VAR_bucket_name: ${{ vars.STACK_NAME }}-frontend-bucket
      TF_STATE_BUCKET: ${{ vars.STACK_NAME }}-state-bucket
      TF_LOCK_TABLE: ${{ vars.STACK_NAME }}-lock-table
      TF_FRONTEND_BUCKET_NAME: ${{ vars.STACK_NAME }}-frontend-bucket

    outputs:
      cognito_domain: ${{ steps.tf_outputs.outputs.cognito_domain }}
      client_id: ${{ steps.tf_outputs.outputs.client_id }}
      bucket_name: ${{ steps.tf_outputs.outputs.bucket_name }}
      api_endpoint: ${{ steps.tf_outputs.outputs.api_endpoint }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Lambda dependencies
        run: bash scripts/install-lambdas.sh

      - name: Terraform Init
        run: bash scripts/terraform-init.sh

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

      # Save the plan to a file and apply that exact file, so the plan that
      # was reviewed is what actually runs. Prevents the apply step from
      # silently picking up state drift that appeared between plan and apply.
      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan
        working-directory: terraform

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        # Passing a saved plan skips the prompt automatically; -auto-approve
        # would be redundant.
        run: terraform apply tfplan
        working-directory: terraform

      - name: Capture Terraform Outputs
        id: tf_outputs
        if: github.ref == 'refs/heads/main'
        working-directory: terraform
        run: |
          echo "cognito_domain=$(terraform output -raw auth_cognito_domain)" >> $GITHUB_OUTPUT
          echo "client_id=$(terraform output -raw auth_client_id)" >> $GITHUB_OUTPUT
          echo "bucket_name=$(terraform output -raw bucket_name)" >> $GITHUB_OUTPUT
          echo "api_endpoint=$(terraform output -raw api_endpoint)" >> $GITHUB_OUTPUT

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: infrastructure
    if: github.ref == 'refs/heads/main'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Create .env.production
        working-directory: frontend
        run: |
          cat > .env.production << EOF
          VITE_COGNITO_DOMAIN=https://${{ needs.infrastructure.outputs.cognito_domain }}.auth.us-east-1.amazoncognito.com
          VITE_COGNITO_CLIENT_ID=${{ needs.infrastructure.outputs.client_id }}
          VITE_API_GATEWAY_CALLBACK_URL=${{ needs.infrastructure.outputs.api_endpoint }}/callback
          VITE_SIMULATIONS_API_URL=${{ needs.infrastructure.outputs.api_endpoint }}
          EOF

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Deploy to S3
        working-directory: frontend
        # No --acl public-read: the bucket has BucketOwnerPreferred ownership
        # and a bucket policy that grants public s3:GetObject on every object,
        # so the ACL flag is redundant and conflicts with the ownership setting.
        run: aws s3 sync dist/ s3://${{ needs.infrastructure.outputs.bucket_name }} --delete
