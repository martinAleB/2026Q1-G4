name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm destruction of all infrastructure'
        required: true

# Serialize destroys so two queued destroys can't race on the state lock.
concurrency:
  group: terraform-destroy
  cancel-in-progress: false

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy'

    # STACK_NAME is the single GitHub variable that namespaces this deployment.
    # All other resource names are derived from it by convention.
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_DEFAULT_REGION: us-east-1
      TF_VAR_stack_name: ${{ vars.STACK_NAME }}
      TF_VAR_bucket_name: ${{ vars.STACK_NAME }}-frontend-bucket
      TF_STATE_BUCKET: ${{ vars.STACK_NAME }}-state-bucket
      TF_LOCK_TABLE: ${{ vars.STACK_NAME }}-lock-table
      TF_FRONTEND_BUCKET_NAME: ${{ vars.STACK_NAME }}-frontend-bucket

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"
          terraform_wrapper: false

      - name: Empty Frontend Bucket
        run: aws s3 rm s3://${{ vars.STACK_NAME }}-frontend-bucket --recursive

      - name: Terraform Init
        run: bash scripts/terraform-init.sh

      - name: Terraform Destroy
        run: bash scripts/terraform-destroy.sh
